<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="msapplication-tap-highlight" content="no"/>
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,viewport-fit=cover"/>
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    <title><%= htmlWebpackPlugin.options.title %></title>
    <style>
      /* 加载占位，避免白屏 */
      html, body { margin: 0; padding: 0; height: 100%; }
      body { background: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      #app-loader {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 16px; color: #64748b;
      }
      .app-loader-spinner {
        width: 36px; height: 36px;
        border: 3px solid #e2e8f0;
        border-top-color: #4f6ef7;
        border-radius: 50%;
        animation: app-loader-spin 0.8s linear infinite;
      }
      @keyframes app-loader-spin {
        to { transform: rotate(360deg); }
      }
      .app-loader-text { font-size: 14px; }
    </style>
  </head>
  <body>
    <noscript>
      <strong>抱歉，<%= htmlWebpackPlugin.options.title %> 需要启用 JavaScript 才能正常工作。请开启后继续。</strong>
    </noscript>
    <!-- 加载占位，Vue 挂载后会被替换 -->
    <div id="app">
      <div id="app-loader">
        <div class="app-loader-spinner"></div>
        <div class="app-loader-text">正在加载…</div>
      </div>
    </div>
    <!-- built files will be auto injected -->
  </body>
</html>
